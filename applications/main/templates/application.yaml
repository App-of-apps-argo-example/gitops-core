{{- range $appName, $appConfig := .Values.apps }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName }}-{{ $.Values.targetNamespace }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/App-of-apps-argo-example/gitops-core.git'
    targetRevision: main
    path: helm-org-charts/general-service
    helm:
      parameters:
        - name: image.repository
          value: {{ $appConfig.image.repository }}
        - name: image.tag
          value: {{ $appConfig.image.tag }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ $.Values.targetNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- end }}
