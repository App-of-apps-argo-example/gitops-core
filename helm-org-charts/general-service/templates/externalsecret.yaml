apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-db-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-db-secret
    creationPolicy: Owner
  data:
    - secretKey: db_password
      remoteRef:
        key: microservice/db-password
        property: password
